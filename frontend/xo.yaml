#
# Here you can reset the ports this docker
# container listens on on your local machine.
# By default, they are 8080 for the web and 8306
# for the database.
#
# You can set CEO to connect to a remote db server automatically,
# assuming you have it set to allow remote access, by setting
# the mysql_remote key to a valid DSN:
# mysql_remote: "mysql://user:pass@server"
#
http: 8080
mysql: 8306
mysql_remote: ''
