version: '3'

services:
  expo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bdh-expo
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "8081:8081"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=localhost
    command: yarn start

volumes:
  node_modules: